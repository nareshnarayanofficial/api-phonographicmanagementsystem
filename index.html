<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonographic Management System API | Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 950: '#050505', 900: '#0b0c0e', 800: '#151618', 700: '#2d2e32' },
                        brand: { 500: '#f43f5e', 400: '#fb7185' } // Changed to Rose/Red for a distinct PMS look
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        pre, code { font-family: 'Fira Code', monospace; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Table Styles */
        .api-table { width: 100%; text-align: left; border-collapse: collapse; font-size: 0.875rem; }
        .api-table th { background-color: #151618; padding: 12px; color: #9ca3af; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid #2d2e32; }
        .api-table td { padding: 12px; border-bottom: 1px solid #2d2e32; color: #d1d5db; vertical-align: top; }
        .api-table tr:last-child td { border-bottom: none; }
        .param-req { color: #f87171; font-size: 0.75rem; margin-left: 4px; }
        .param-type { color: #f43f5e; font-family: 'Fira Code', monospace; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-dark-900 text-gray-300 h-screen flex flex-col overflow-hidden">

    <header class="h-16 border-b border-dark-700 bg-dark-950 flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-brand-500 rounded flex items-center justify-center text-white font-bold tracking-tighter">PMS</div>
            <span class="text-white font-bold text-lg tracking-tight">Phonographic Management System <span class="text-gray-500 font-light">API</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-mono bg-dark-800 border border-dark-700 px-2 py-1 rounded text-gray-400">v3.0 Stable</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-dark-950 border-r border-dark-700 flex flex-col overflow-y-auto shrink-0">
            <nav class="p-6 space-y-8">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 px-2">Core</h3>
                    <ul class="space-y-1">
                        <li><button onclick="loadPage('intro')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-white bg-dark-800">Introduction</button></li>
                        <li><button onclick="loadPage('storage')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-gray-400 hover:text-white hover:bg-dark-800">Storage & Assets</button></li>
                    </ul>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 px-2">Management</h3>
                    <ul class="space-y-1">
                        <li><button onclick="loadPage('accounts')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-gray-400 hover:text-white hover:bg-dark-800">Accounts & Auth</button></li>
                        <li><button onclick="loadPage('clients')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-gray-400 hover:text-white hover:bg-dark-800">Clients</button></li>
                    </ul>
                </div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto bg-dark-900 relative scroll-smooth">
            <div id="content-container" class="max-w-5xl mx-auto p-12">
                </div>
        </main>
    </div>

    <script>
        async function loadPage(pageName) {
            const container = document.getElementById('content-container');
            container.innerHTML = '<div class="text-gray-500 animate-pulse">Loading...</div>';
            try {
                const response = await fetch(`pages/${pageName}.html`);
                if (!response.ok) throw new Error("Page not found");
                container.innerHTML = `<div class="fade-in">${await response.text()}</div>`;
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-dark-800', 'text-white');
                    btn.classList.add('text-gray-400');
                    if(btn.getAttribute('onclick').includes(pageName)) {
                        btn.classList.add('bg-dark-800', 'text-white');
                        btn.classList.remove('text-gray-400');
                    }
                });
            } catch (error) {
                container.innerHTML = `<div class="text-red-500">Error: ${error.message}. Ensure you are running on a local server (localhost).</div>`;
            }
        }
        document.addEventListener('DOMContentLoaded', () => loadPage('intro'));
    </script>
</body>
</html>
