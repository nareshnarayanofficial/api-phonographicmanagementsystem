<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonoGraph API Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0b0c0e', 800: '#151618', 700: '#2d2e32' },
                        brand: { 500: '#6366f1' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Smooth fade animation when pages load */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-dark-900 text-gray-300 h-screen flex flex-col overflow-hidden">

    <header class="h-16 border-b border-dark-700 bg-dark-900 flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-2">
            <span class="text-white font-bold text-xl tracking-tight">PhonoGraph<span class="text-gray-500 font-light">API</span></span>
        </div>
        <div class="text-xs font-mono bg-dark-800 border border-dark-700 px-2 py-1 rounded text-gray-400">v2.1 Connected</div>
    </header>

    <div class="flex flex-1 overflow-hidden">

        <aside class="w-64 bg-dark-900 border-r border-dark-700 flex flex-col overflow-y-auto shrink-0">
            <nav class="p-6 space-y-8">
                <div>
                    <h3 class="text-xs font-bold text-white uppercase tracking-wider mb-3">General</h3>
                    <ul class="space-y-1">
                        <li><button onclick="loadPage('intro')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-white bg-dark-800">Introduction</button></li>
                        <li><button onclick="loadPage('auth')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-gray-400 hover:text-white hover:bg-dark-800">Authentication</button></li>
                    </ul>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-white uppercase tracking-wider mb-3">Catalog</h3>
                    <ul class="space-y-1">
                        <li><button onclick="loadPage('artists')" class="nav-btn w-full text-left block px-3 py-2 rounded text-sm transition text-gray-400 hover:text-white hover:bg-dark-800">Artists</button></li>
                        </ul>
                </div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto bg-dark-900 relative">
            <div id="content-container" class="max-w-4xl mx-auto p-12">
                </div>
        </main>

    </div>

    <script>
        // 1. Function to fetch page content
        async function loadPage(pageName) {
            const container = document.getElementById('content-container');
            
            // Show loading state
            container.innerHTML = '<div class="text-gray-500">Loading...</div>';

            try {
                // Fetch the HTML file from the /pages folder
                const response = await fetch(`pages/${pageName}.html`);
                
                if (!response.ok) throw new Error("Page not found");
                
                const html = await response.text();
                
                // Inject HTML
                container.innerHTML = `<div class="fade-in">${html}</div>`;
                
                // Update Active Link Styling
                updateActiveLink(pageName);

            } catch (error) {
                container.innerHTML = `<div class="text-red-500">Error loading page: ${error.message}</div>`;
            }
        }

        // 2. Helper to highlight the active menu item
        function updateActiveLink(activePage) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                // Reset classes
                btn.classList.remove('bg-dark-800', 'text-white');
                btn.classList.add('text-gray-400');
                
                // Check if this button loads the active page
                if(btn.getAttribute('onclick').includes(activePage)) {
                    btn.classList.add('bg-dark-800', 'text-white');
                    btn.classList.remove('text-gray-400');
                }
            });
        }

        // 3. Load the Intro page by default when website opens
        document.addEventListener('DOMContentLoaded', () => {
            loadPage('intro');
        });
    </script>

</body>
</html>
